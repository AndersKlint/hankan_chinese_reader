name: hankan_chinese_reader
description: "A Chinese reading assistant with popup dictionary support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  chinese_popup_dict:
    path: ../chinese_popup_dict
  mobile_ocr:
    path: ../mobile_ocr
  get_it: ^9.0.0
  watch_it: ^2.4.2
  pdfrx: ^2.2.0
  file_picker: ^9.0.0
  google_fonts: ^6.0.0
  logging: ^1.3.0
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0

icons_launcher:
  image_path: assets/icon/app_icon.png
  platforms:
    android:
      enable: true
    ios:
      enable: true
    macos:
      enable: true
    linux:
      enable: true
    windows:
      enable: true
    web:
      enable: true

flutter:
  uses-material-design: true

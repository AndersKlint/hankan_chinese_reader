name: hankan_chinese_reader
description: "A Chinese reading assistant with popup dictionary support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  chinese_popup_dict:
    git:
      url: https://github.com/AndersKlint/flutter_package_chinese_popup_dict.git
      ref: f8fb40bec22d2535a31585df12a5f0b42ea576e1
    # path: ../chinese_popup_dict
  dart_paddle_ocr:
    git:
      url: https://github.com/AndersKlint/dart_paddle_ocr.git
      ref: a8c3097220978a006a6821826e5b24d98bc0e867
    # path: ../dart_paddle_ocr
  get_it: ^9.0.0
  watch_it: ^2.4.2
  pdfrx: ^2.2.0
  file_picker: ^9.0.0
  google_fonts: ^6.0.0
  logging: ^1.3.0
  image: ^4.8.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0

icons_launcher:
  image_path: assets/icon/app_icon.png
  platforms:
    android:
      enable: true
    ios:
      enable: true
    macos:
      enable: true
    linux:
      enable: true
    windows:
      enable: true
    web:
      enable: true

flutter:
  uses-material-design: true

name: Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup GitHub auth for private repos
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          @"
          machine github.com
          login x-access-token
          password $env:TOKEN
          "@ | Out-File -FilePath "$env:USERPROFILE\.netrc" -Encoding ascii
          
          # Restrict permissions (important for Git to accept it)
          icacls "$env:USERPROFILE\.netrc" /inheritance:r
          icacls "$env:USERPROFILE\.netrc" /grant:r "$($env:USERNAME):(R)"

      - run: flutter pub get

      - run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/